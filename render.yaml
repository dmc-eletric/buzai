services:
  - type: web
    name: buaizai-api
    env: python
    region: singapore
    plan: free
    # Sửa Build Command để đảm bảo cài đặt vào đúng môi trường
    buildCommand: pip install -r requirements.txt
    # Sửa Start Command: Sử dụng python -m uvicorn để Render tìm thấy module
    startCommand: ./.venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buaizai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_ID
        value: admin
      - key: DEFAULT_ADMIN_PW
        value: admin
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_BASE_URL
        value: https://buaizai-api.onrender.com
      - key: TOKEN_EXPIRE_HOURS
        value: "12"
      - key: AUTO_CLEANUP_DAYS
        value: "0"

databases:
  - name: buaizai-db
    databaseName: buaizai
    user: buaizai_user
    plan: free